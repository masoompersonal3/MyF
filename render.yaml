services:
  - type: web
    name: portfolio-backend
    env: node
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false # Set this manually in the Render dashboard
      - key: PORT
        value: 5000
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false # e.g. https://your-portfolio.onrender.com
